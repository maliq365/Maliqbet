<!DOCTYPE html>

<html>

<head>

  <title>VoraBet</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="top">

  <h1>VoraBet</h1>

  <div class="balance">

    Piket: <span id="money">10000</span>

  </div>

</div>

<div class="menu">

  <button onclick="show('sport')">Sport</button>

  <button onclick="show('casino')">Casino</button>

  <button onclick="show('dogs')">Dog Racing</button>

</div>

<div id="sport" class="page">

  <h2>Ndeshje</h2>

  <div class="match">

    <p>Real Madrid vs Barcelona</p>

    <button onclick="bet(2)">1 @2.0</button>

    <button onclick="bet(3)">X @3.0</button>

    <button onclick="bet(2.5)">2 @2.5</button>

  </div>

  <div class="match">

    <p>Milan vs Inter</p>

    <button onclick="bet(1.8)">1 @1.8</button>

    <button onclick="bet(2.4)">X @2.4</button>

    <button onclick="bet(2.1)">2 @2.1</button>

  </div>

</div>

<div id="casino" class="page hidden">

  <h2>Casino</h2>

  <button onclick="slot()">SPIN</button>

  <p id="slotResult"></p>

</div>

<div id="dogs" class="page hidden">

  <h2>Dog Racing</h2>

  <button onclick="dogRace()">Start Race</button>

  <p id="dogResult"></p>

</div>

<script src="script.js"></script>

</body>

</html>
